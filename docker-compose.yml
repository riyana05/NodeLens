version: '3.9'

# ── Local development stack ──────────────────────────────────
# Usage: docker compose up -d
# Then start backend and frontend manually (npm run dev).
# Provides local MongoDB + Neo4j + Redis so you don't need
# cloud accounts during development.

services:
  mongo:
    image: mongo:7
    container_name: sg_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: socialgraph
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5
    container_name: sg_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    container_name: sg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  neo4j_data:
  redis_data:

# ── Local .env values when using docker compose ──────────────
# MONGO_URI=mongodb://root:rootpass@localhost:27017/socialgraph?authSource=admin
# NEO4J_URI=bolt://localhost:7687
# NEO4J_USER=neo4j
# NEO4J_PASSWORD=testpassword
# REDIS_URL=redis://localhost:6379
